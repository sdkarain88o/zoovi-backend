<html>
<head>
<title>Admin Login</title>
</head>
<body>

<h2>🔐 Admin Login</h2>

<input id="pass" type="password" placeholder="Enter Password">
<button onclick="login()">Login</button>

<h2>🔐 Admin Login</h2>

<input id="u" placeholder="Username"><br><br>
<input id="p" placeholder="Password" type="password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<h2>🔐 Admin Login</h2>

<input id="u" placeholder="Username"><br><br>
<input id="p" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>
function login(){

let u = document.getElementById("u").value;
let p = document.getElementById("p").value;

fetch(`/admin-login?username=${u}&password=${p}`)
.then(res=>res.json())
.then(data=>{

if(data.success){

localStorage.setItem("token",data.token);
location.href="dashboard.html";

}else{

document.getElementById("msg").innerText="Wrong Login ❌";

}

});

}

function login(){

let u = document.getElementById("u").value;
let p = document.getElementById("p").value;

fetch(`/admin-login?username=${u}&password=${p}`)
.then(res=>res.json())
.then(data=>{

if(data.success){

localStorage.setItem("token",data.token);
location.href="dashboard.html";

}else{
document.getElementById("msg").innerText="Wrong Login ❌";
}

});

}

if(localStorage.getItem("auth") !== "ok"){
window.location.href = "login.html";
}

if(localStorage.getItem("role") !== "admin"){
alert("Access Denied ❌");
window.location.href = "login.html";
}

function login(){

let username = document.getElementById("user").value;
let password = document.getElementById("pass").value;

fetch(`/login?username=${username}&password=${password}`)
.then(res=>res.json())
.then(data=>{

if(data.status === "success"){

localStorage.setItem("auth","ok");
localStorage.setItem("role",data.role);

window.location.href = "dashboard.html";

}else{
document.getElementById("msg").innerText = "Wrong login ❌";
}

});

}

function logout(){
localStorage.removeItem("auth");
window.location.href = "login.html";
}

if(localStorage.getItem("auth") !== "ok"){
window.location.href = "login.html";
}

function login(){

let pass = document.getElementById("pass").value;

fetch(`/login?pass=${pass}`)
.then(res=>res.text())
.then(data=>{

if(data === "success"){
localStorage.setItem("auth","ok");
window.location.href = "dashboard.html";
}else{
document.getElementById("msg").innerText = "Wrong Password ❌";
}

});

}

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>

<button onclick="logout()">Logout</button>

</script>

</body>
</html>
