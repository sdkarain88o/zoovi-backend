<h2>📦 Track Your Order</h2>

<input id="oid" placeholder="Order ID">
<button onclick="track()">Track</button>

<div id="result"></div>

<script>
function track(){

let id = document.getElementById("oid").value;

fetch(`/track-order?id=${id}`)
.then(res=>res.json())
.then(data=>{

if(data.error){
document.getElementById("result").innerText="Order not found ❌";
return;
}

document.getElementById("result").innerHTML = `
<h3>Status: ${data.status}</h3>
<p>Items: ${data.items}</p>
<p>Total: Rs ${data.total}</p>
`;

});

}
</script>
